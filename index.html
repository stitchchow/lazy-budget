<script>
    let finalAmount = 0;
    let finalCategory = "ж—Ҙеёёж¶ҲиІ»";
    let logs = JSON.parse(localStorage.getItem('ж“әзҲӣиЁҳеёіData_OCR')) || [];

    function predictCategoryByTime() {
        const hour = new Date().getHours();
        if (hour >= 6 && hour < 11) return "вҳ• ж—©йӨҗдәӨйҖҡ";
        if (hour >= 11 && hour < 14) return "рҹҚұ зәҢе‘ҪеҚҲйӨҗ";
        if (hour >= 14 && hour < 17) return "рҹҚ° иӣҮзҺӢдёӢеҚҲиҢ¶";
        if (hour >= 17 && hour < 21) return "рҹҸ  ж”ҫе·ҘжҷҡйӨҗ";
        if (hour >= 21 && hour < 24) return "рҹҚә зҶұиЎҖе®өеӨң";
        return "рҹҢҷ еҮҢжҷЁзҘһз§ҳж¶ҲиІ»";
    }

    function matchCategoryByText(rawText) {
        const text = rawText.toLowerCase();
        if (/coffee|cafe|alpha|starbucks|mcdonald|breakfast|ж—©|зҫҺеҝғиҘҝйӨ…/.test(text)) return "вҳ• ж—©йӨҗ / е’–е•Ўеә—";
        if (/foodpanda|keeta|deliveroo|restaurant|йӨҗ|йәө|йЈҜ|ж„ҸзІү|иӯҡд»”|еӨ§е®¶жЁӮ|еӨ§еҝ«жҙ»/.test(text)) return "рҹҚұ зәҢе‘ҪжӯЈйӨҗ / еӨ–иіЈ";
        if (/mtr|kmb|lrt|taxi|uber|е…«йҒ”йҖҡ|ең°йҗө|зҡ„еЈ«|е·ҙеЈ«|йҒҺжө·/.test(text)) return "рҹҡҮ дәӨйҖҡйҒӢијё";
        if (/apple|hkt|psn|nintendo|steam|taobao|hktvmall|ж·ҳеҜ¶|иӘІйҮ‘|иІ·|з¶Іиіј/.test(text)) return "рҹӣҚпёҸ з¶ІиіјеЁӣжЁӮ / иӘІйҮ‘";
        return predictCategoryByTime();
    }

    function handleImage(input) {
        const file = input.files[0];
        if (!file) return;

        document.getElementById('ocr-status').innerText = "вҡЎ ж“әзҲӣ AI жӯЈеңЁж·ұеәҰжҺғжҸҸж–Үеӯ—иҲҮе…§е®№...";
        document.getElementById('debug-box').style.display = 'none';
        
        const reader = new FileReader();
        reader.onload = function() {
            Tesseract.recognize(
                reader.result,
                'eng+chi_tra',
                { logger: m => console.log(m.status + ": " + Math.round(m.progress * 100) + "%") }
            ).then(({ data: { text } }) => {
                document.getElementById('debug-box').innerText = "рҹ”Қ и®ҖеҸ–еҲ°зҡ„еҚЎе–®е…§е®№:\n" + text;
                document.getElementById('debug-box').style.display = 'block';

                finalCategory = matchCategoryByText(text);
                document.getElementById('prediction-type').innerText = "рҹ’Ў дҫқж“ҡжҲӘең–е•ҶжҲ¶еҢ№й…Қе“ҒйЎһпјҡ";
                document.getElementById('auto-cat').innerText = finalCategory;

                let cleanText = text.replace(/,/g, '');
                let detectedNumbers = [];

                const currencyRegex = /(?:HK\$|\$)\s*(\d+(?:\.\d{1,2})?)/gi;
                let match;
                while ((match = currencyRegex.exec(cleanText)) !== null) {
                    detectedNumbers.push(parseFloat(match[1]));
                }

                if (detectedNumbers.length === 0) {
                    const keywordRegex = /(?:total|amount|sum|pay|fps|иҪүеёі|зёҪиЁҲ|йҮ‘йЎҚ|рҹӣЎпёҸ|рҹ’°)\s*:?\s*(\d+(?:\.\d{1,2})?)/gi;
                    while ((match = keywordRegex.exec(cleanText)) !== null) {
                        detectedNumbers.push(parseFloat(match[1]));
                    }
                }

                if (detectedNumbers.length === 0) {
                    const generalPriceRegex = /\b\d{2,4}\b/g;
                    const pureNumbers = cleanText.match(generalPriceRegex);
                    if (pureNumbers) {
                        detectedNumbers = pureNumbers.map(n => parseFloat(n)).filter(num => num < 2020 || num > 2030);
                    }
                }

                if (detectedNumbers.length > 0) {
                    let maxAmount = Math.max(...detectedNumbers);
                    finalAmount = Math.round(maxAmount);
                    document.getElementById('ocr-status').innerText = "вң… иҮӘеӢ•иҫЁиӯҳйҮ‘йЎҚиҲҮе“ҒйЎһжҲҗеҠҹпјҒ";
                    updateUI();
                } else {
                    document.getElementById('ocr-status').innerText = "вҡ пёҸ и®ҖеҲ°е“ҒйЎһпјҢдҪҶйҮ‘йЎҚжЁЎзіҠпјҢи«ӢжүӢеӢ•ж Ўе°Қ";
                }
            }).catch(err => {
                document.getElementById('ocr-status').innerText = "вҡ пёҸ иҫЁиӯҳеӨұж•—пјҢи«ӢеҶҚи©ҰдёҖж¬Ў";
                console.error(err);
            });
        };
        reader.readAsDataURL(file);
    }

    function adjustAmount(val) {
        finalAmount += val;
        if (finalAmount < 0) finalAmount = 0;
        updateUI();
    }

    function resetInput() {
        finalAmount = 0;
        finalCategory = predictCategoryByTime();
        document.getElementById('prediction-type').innerText = "зі»зөұз•¶еүҚй җеҲӨпјҡ";
        document.getElementById('auto-cat').innerText = finalCategory;
        document.getElementById('ocr-status').innerText = "зӯүеҫ…дёӢејөең–зүҮ...";
        document.getElementById('debug-box').style.display = 'none';
        updateUI();
    }

    function saveRecord() {
        if (finalAmount <= 0) return;
        const timeString = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

        logs.unshift({
            id: Date.now(),
            amount: finalAmount,
            category: finalCategory,
            time: timeString
        });
        localStorage.setItem('ж“әзҲӣиЁҳеёіData_OCR', JSON.stringify(logs));

        resetInput();
    }

    // ж–°еўһпјҡзӣҙжҺҘдҝ®ж”№йҮ‘йЎҚеҠҹиғҪ
    function editRecord(id) {
        const targetLog = logs.find(log => log.id === id);
        if (!targetLog) return;
        
        // еҪҲеҮәијёе…ҘжЎҶи®“з”ЁжҲ¶ж”№ж•ёеӯ—
        const newAmount = prompt(`и«Ӣијёе…Ҙж–°зҡ„йҮ‘йЎҚ (з•¶еүҚ: $${targetLog.amount}):`, targetLog.amount);
        
        if (newAmount !== null && !isNaN(newAmount) && parseInt(newAmount) >= 0) {
            targetLog.amount = Math.round(parseInt(newAmount));
            localStorage.setItem('ж“әзҲӣиЁҳеёіData_OCR', JSON.stringify(logs));
            updateUI();
        }
    }

    function deleteRecord(id) {
        logs = logs.filter(log => log.id !== id);
        localStorage.setItem('ж“әзҲӣиЁҳеёіData_OCR', JSON.stringify(logs));
        updateUI();
    }

    function updateUI() {
        document.getElementById('display-amount').innerText = `$${finalAmount}`;
        const box = document.getElementById('history-box');
        if (logs.length === 0) {
            box.innerHTML = `<div style="color: #666; text-align: center; font-size: 12px; padding: 15px;">жңӘжңүзҙҖйҢ„пјҢз№јзәҢж“әзҲӣ</div>`;
            return;
        }
        // еңЁйҖҷиЈЎжёІжҹ“жҷӮеҠ дәҶ editRecord(${log.id}) зҡ„жҢүйҲ•
        box.innerHTML = logs.map(log => `
            <div class="history-item">
                <span>[${log.time}] ${log.category} <b style="color: #ffb74d; margin-left: 10px;">+$${log.amount}</b></span>
                <div>
                    <button style="background:none; border:none; cursor:pointer; font-size:14px; margin-right:8px;" onclick="editRecord(${log.id})">вңҸпёҸ</button>
                    <button class="btn-delete" onclick="deleteRecord(${log.id})">вқҢ</button>
                </div>
            </div>
        `).join('');
    }

    finalCategory = predictCategoryByTime();
    document.getElementById('auto-cat').innerText = finalCategory;
    updateUI();
</script>
