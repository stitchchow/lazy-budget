<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能單品識別記帳 Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: #121212; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .container { width: 100%; max-width: 400px; background: #1e1e1e; padding: 25px; border-radius: 24px; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
        h1 { font-size: 22px; color: #ffb74d; margin: 0 0 5px 0; }
        .subtitle { font-size: 13px; color: #aaa; margin-bottom: 20px; }
        .ocr-zone { background: #37474f; padding: 15px; border-radius: 16px; margin-bottom: 15px; border: 1px solid #00e5ff; }
        .btn-upload { background: #00e5ff; color: #000; border: none; padding: 12px; font-size: 15px; font-weight: bold; border-radius: 12px; cursor: pointer; width: 100%; display: block; text-align: center; }
        #ocr-status { font-size: 12px; color: #00e5ff; margin-top: 8px; font-weight: bold; min-height: 16px; }
        .current-input { font-size: 45px; font-weight: bold; color: #81c784; margin: 15px 0; letter-spacing: 1px; }
        .money-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 15px; }
        .btn-money { background: #388e3c; color: white; border: none; padding: 12px 5px; font-size: 15px; font-weight: bold; border-radius: 12px; cursor: pointer; }
        .btn-money.minus { background: #c62828; }
        .btn-money.clear { background: #555; grid-column: span 4; padding: 8px; font-size: 12px; }
        .btn-action { background: #0288d1; color: white; border: none; padding: 15px; font-size: 18px; font-weight: bold; border-radius: 16px; cursor: pointer; width: 100%; margin-bottom: 15px; }
        .history { text-align: left; max-height: 220px; overflow-y: auto; background: #1a1a1a; padding: 10px; border-radius: 12px; font-size: 13px; margin-bottom: 15px; }
        .history-item { padding: 8px 0; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .btn-delete { background: none; border: none; color: #ff5252; cursor: pointer; font-size: 14px; padding: 0 5px; }
        .total-box { background: #ffb74d; color: #000; padding: 15px; border-radius: 16px; font-weight: bold; margin-top: 10px; }
        .total-box span { font-size: 26px; display: block; margin-top: 5px; color: #121212; }
        .debug-log { font-size: 11px; color: #ffb74d; text-align: left; background: #000; padding: 10px; border-radius: 8px; max-height: 120px; overflow-y: auto; margin-top: 10px; border: 1px dashed #666; white-space: pre-wrap; }
    </style>
</head>
<body>

<div class="container">
    <h1>多單品自動流水帳 Pro</h1>
    <div class="subtitle">自動提取多項商品明細與拆分金額</div>

    <div class="ocr-zone">
        <label for="file-input" class="btn-upload">📸 上載多品項收據 Screencap</label>
        <input type="file" id="file-input" accept="image/*" style="display: none;" onchange="handleImage(this)">
        <div id="ocr-status">等待上載圖片...</div>
    </div>

    <div class="current-input" id="display-amount">$0</div>

    <div class="money-grid">
        <button class="btn-money minus" onclick="adjustAmount(-10)">-$10</button>
        <button class="btn-money minus" onclick="adjustAmount(-1)">-$1</button>
        <button class="btn-money" onclick="adjustAmount(1)">+$1</button>
        <button class="btn-money" onclick="adjustAmount(10)">+$10</button>
        <button class="btn-money clear" onclick="resetInput()">歸零 / 重設</button>
    </div>

    <button class="btn-action" onclick="saveManualRecord()">👌 手動加算一筆紀錄</button>

    <h3 style="font-size: 13px; text-align: left; margin: 10px 0 5px 0; color: #aaa;">今日流水帳明細：</h3>
    <div class="history" id="history-box"></div>

    <div class="total-box">
        📊 流水帳總和合計 (Total Sum)
        <span id="grand-total">$0</span>
    </div>
    
    <div id="debug-box" class="debug-log"></div>
</div>

<script>
    let finalAmount = 0;
    let logs = [];
    
    try {
        logs = JSON.parse(localStorage.getItem('擺爛記帳Data_OCR')) || [];
        if (!Array.isArray(logs)) logs = [];
    } catch(e) {
        logs = [];
    }

    function predictCategoryByTime() {
        const hour = new Date().getHours();
        if (hour >= 6 && hour < 11) return "☕ 早餐 / 交通";
        if (hour >= 11 && hour < 14) return "🍱 續命午餐";
        if (hour >= 14 && hour < 17) return "🍰 蛇王下午茶";
        if (hour >= 17 && hour < 21) return "🏠 放工晚餐";
        return "🍺 熱血宵夜";
    }

    function handleImage(input) {
        const file = input.files[0];
        if (!file) return;

        document.getElementById('ocr-status').innerText = "⚡ 正在批量提取單品清單...";
        
        const reader = new FileReader();
        reader.onload = function() {
            Tesseract.recognize(
                reader.result,
                'eng+chi_tra'
            ).then(({ data: { text } }) => {
                document.getElementById('debug-box').innerText = "🔍 掃描原始文字：\n" + text;
                document.getElementById('debug-box').style.display = 'block';

                const lines = text.split('\n');
                let detectedItems = [];
                
                // 排除不屬於商品的明細關鍵字
                const ignoreKeywords = /(?:total|sub total|subtotal|cash|change|tendered|thank|balance|invoice|receipt|visa|master|fps|轉帳|總計|金額|items sold|qty|description|price|sales)/i;

                for (let line of lines) {
                    let cleanLine = line.trim();
                    if (!cleanLine || ignoreKeywords.test(cleanLine)) continue;

                    // 放寬價格匹配：允許數字前後存在 OCR 雜訊或錯別字符
                    const priceMatch = cleanLine.match(/(?:[\$£¥]|\b)(\d+(?:\.\d{1,2})?)\b/);
                    
                    if (priceMatch) {
                        let price = parseFloat(priceMatch[1]);
                        
                        // 提取商品名稱：拿掉數量 (如 1x)、拿掉找到的價格數字，以及常見雜訊符號
                        let namePart = cleanLine.replace(priceMatch[0], '')
                                                 .replace(/^\d+s*x/i, '')
                                                 .replace(/[\d\.\$£¥]/g, '')
                                                 .replace(/[^\u4e00-\u9fa5a-zA-Z\s]/g, '') // 只保留中英文字元與空格
                                                 .trim();

                        // 清除掉長度過短或純屬雜訊的品名字串 (如殘留的單一錯字 "nao")
                        namePart = namePart.replace(/\b[a-zA-Z]{1,3}\b\s*$/g, '').trim(); 

                        if (namePart.length > 2 && price > 0) {
                            detectedItems.push({ name: namePart, price: Math.round(price) });
                        }
                    }
                }

                // 如果放寬規則依舊因為相片模糊沒配對到任何行，執行保底價格搜尋
                if (detectedItems.length === 0) {
                    const fallbackMatches = text.replace(/,/g, '').match(/\b\d+(?:\.\d{1,2})?\b/g);
                    if (fallbackMatches) {
                        const prices = fallbackMatches.map(Number).filter(p => p > 0 && p < 1000);
                        if (prices.length > 0) {
                            // 挑選常規低標金額作為保底
                            let fallbackPrice = Math.round(Math.min(...prices));
                            detectedItems.push({ name: predictCategoryByTime(), price: fallbackPrice });
                        }
                    }
                }

                if (detectedItems.length > 0) {
                    const timeString = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                    detectedItems.forEach(item => {
                        logs.unshift({
                            id: Date.now() + Math.random(), 
                            amount: item.price,
                            category: item.name,
                            time: timeString
                        });
                    });
                    localStorage.setItem('擺爛記帳Data_OCR', JSON.stringify(logs));
                    document.getElementById('ocr-status').innerText = `✅ 成功導入 ${detectedItems.length} 項單品！`;
                } else {
                    document.getElementById('ocr-status').innerText = "⚠️ 無法解析明細，請使用上方按鈕手動記帳";
                }
                updateUI();
            }).catch(err => {
                document.getElementById('ocr-status').innerText = "⚠️ 辨識出錯";
                console.error(err);
            });
        };
        reader.readAsDataURL(file);
    }

    function adjustAmount(val) {
        finalAmount += val;
        if (finalAmount < 0) finalAmount = 0;
        document.getElementById('display-amount').innerText = `$${finalAmount}`;
    }

    function resetInput() {
        finalAmount = 0;
        document.getElementById('ocr-status').innerText = "等待下張圖片...";
        document.getElementById('debug-box').style.display = 'none';
        updateUI();
    }

    function saveManualRecord() {
        if (finalAmount <= 0) return;
        const timeString = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        logs.unshift({
            id: Date.now(),
            amount: finalAmount,
            category: predictCategoryByTime(),
            time: timeString
        });
        localStorage.setItem('擺爛記帳Data_OCR', JSON.stringify(logs));
        finalAmount = 0;
        updateUI();
    }

    function editRecord(id) {
        const targetLog = logs.find(log => log.id === id);
        if (!targetLog) return;
        const newCategory = prompt("請輸入項目名稱:", targetLog.category);
        if (newCategory === null) return;
        const newAmount = prompt("請輸入金額:", targetLog.amount);
        if (newAmount !== null && !isNaN(newAmount) && parseInt(newAmount) >= 0) {
            targetLog.category = newCategory.trim() || "未命名項目";
            targetLog.amount = Math.round(parseInt(newAmount));
            localStorage.setItem('擺爛記帳Data_OCR', JSON.stringify(logs));
            updateUI();
        }
    }

    function deleteRecord(id) {
        logs = logs.filter(log => log.id !== id);
        localStorage.setItem('擺爛記帳Data_OCR', JSON.stringify(logs));
        updateUI();
    }

    function updateUI() {
        document.getElementById('display-amount').innerText = `$${finalAmount}`;
        const totalSum = logs.reduce((sum, log) => sum + log.amount, 0);
        document.getElementById('grand-total').innerText = `$${totalSum}`;

        const box = document.getElementById('history-box');
        if (logs.length === 0) {
            box.innerHTML = `<div style="color: #666; text-align: center; font-size: 12px; padding: 15px;">暫無紀錄</div>`;
            return;
        }
        box.innerHTML = logs.map(log => `
            <div class="history-item">
                <span>[${log.time}] <b>${log.category}</b> <b style="color: #ffb74d; margin-left: 5px;">+$${log.amount}</b></span>
                <div>
                    <button style="background:none; border:none; cursor:pointer; font-size:14px; margin-right:8px;" onclick="editRecord(${log.id})">✏️</button>
                    <button class="btn-delete" onclick="deleteRecord(${log.id})">❌</button>
                </div>
            </div>
        `).join('');
    }

    updateUI();
</script>

</body>
</html>
