<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>極度擺爛·AI智能文本匹配記帳 Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #121212; color: #fff;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; margin: 0; padding: 20px;
        }
        .container { width: 100%; max-width: 400px; background: #1e1e1e; padding: 25px; border-radius: 24px; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
        h1 { font-size: 22px; color: #ffb74d; margin: 0 0 5px 0; }
        .subtitle { font-size: 13px; color: #aaa; margin-bottom: 20px; }
        
        .panel { background: #2d2d2d; padding: 15px; border-radius: 16px; margin-bottom: 15px; border: 1px solid #444; }
        .category-badge { display: inline-block; background: #ff5722; color: white; padding: 4px 12px; border-radius: 20px; font-size: 16px; font-weight: bold; margin-top: 5px; }
        
        .current-input { font-size: 45px; font-weight: bold; color: #81c784; margin: 15px 0; letter-spacing: 1px; }

        /* OCR 區域 */
        .ocr-zone { background: #37474f; padding: 15px; border-radius: 16px; margin-bottom: 15px; border: 1px solid #00e5ff; }
        .btn-upload { background: #00e5ff; color: #000; border: none; padding: 12px; font-size: 15px; font-weight: bold; border-radius: 12px; cursor: pointer; width: 100%; display: block; text-align: center; }
        #ocr-status { font-size: 12px; color: #00e5ff; margin-top: 8px; font-weight: bold; min-height: 16px; }

        /* 快速調整面板 */
        .money-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 15px; }
        .btn-money { background: #388e3c; color: white; border: none; padding: 12px 5px; font-size: 15px; font-weight: bold; border-radius: 12px; cursor: pointer; }
        .btn-money.minus { background: #c62828; }
        .btn-money.clear { background: #555; grid-column: span 4; padding: 8px; font-size: 12px; }
        
        .btn-action { background: #0288d1; color: white; border: none; padding: 15px; font-size: 18px; font-weight: bold; border-radius: 16px; cursor: pointer; width: 100%; margin-bottom: 15px; }
        
        /* 歷史紀錄與刪除鍵 */
        .history { text-align: left; max-height: 180px; overflow-y: auto; background: #1a1a1a; padding: 10px; border-radius: 12px; font-size: 13px; }
        .history-item { padding: 8px 0; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .btn-delete { background: none; border: none; color: #ff5252; cursor: pointer; font-size: 14px; padding: 0 5px; }

        .debug-log { font-size: 10px; color: #aaa; text-align: left; background: #000; padding: 8px; border-radius: 8px; max-height: 80px; overflow-y: auto; display: none; margin-top: 10px; border: 1px dashed #666; }
    </style>
</head>
<body>

<div class="container">
    <h1>懶人自動記帳 Pro</h1>
    <div class="subtitle">圖片智能文字匹配 · 跨時段精準分類</div>

    <div class="panel">
        <div style="font-size: 13px; color: #ccc;" id="prediction-type">系統當前預判：</div>
        <div id="auto-cat" class="category-badge">日常消費</div>
    </div>

    <div class="ocr-zone">
        <label for="file-input" class="btn-upload">📸 上載舊單 / 收據 Screencap</label>
        <input type="file" id="file-input" accept="image/*" style="display: none;" onchange="handleImage(this)">
        <div id="ocr-status">等待上載圖片...</div>
    </div>

    <div class="current-input" id="display-amount">$0</div>

    <div class="money-grid">
        <button class="btn-money minus" onclick="adjustAmount(-10)">-$10</button>
        <button class="btn-money minus" onclick="adjustAmount(-1)">-$1</button>
        <button class="btn-money" onclick="adjustAmount(1)">+$1</button>
        <button class="btn-money" onclick="adjustAmount(10)">+$10</button>
        <button class="btn-money clear" onclick="resetInput()">歸零 / 重設</button>
    </div>

    <button class="btn-action" onclick="saveRecord()">👌 確認記低（自動儲存）</button>

    <h3 style="font-size: 13px; text-align: left; margin: 10px 0 5px 0; color: #aaa;">今日流水帳：</h3>
    <div class="history" id="history-box"></div>
    
    <div id="debug-box" class="debug-log"></div>
</div>

<script>
    let finalAmount = 0;
    let finalCategory = "日常消費";
    let logs = JSON.parse(localStorage.getItem('擺爛記帳Data_OCR')) || [];

    // 基礎時間預判（純手動或未上載圖片時的保底）
    function predictCategoryByTime() {
        const hour = new Date().getHours();
        if (hour >= 6 && hour < 11) return "☕ 早餐交通";
        if (hour >= 11 && hour < 14) return "🍱 續命午餐";
        if (hour >= 14 && hour < 17) return "🍰 蛇王下午茶";
        if (hour >= 17 && hour < 21) return "🏠 放工晚餐";
        if (hour >= 21 && hour < 24) return "🍺 熱血宵夜";
        return "🌙 凌晨神秘消費";
    }

    // 智能核心：依據截圖中讀出的商戶/文字關鍵字進行分類匹配
    function matchCategoryByText(rawText) {
        const text = rawText.toLowerCase();

        // 1. 早餐/咖啡店關鍵字
        if (/coffee|cafe|alpha|starbucks|mcdonald|breakfast|早|美心西餅/.test(text)) {
            return "☕ 早餐 / 咖啡店";
        }
        // 2. 正餐/外賣平台關鍵字
        if (/foodpanda|keeta|deliveroo|restaurant|餐|麵|飯|意粉|譚仔|大家樂|大快活/.test(text)) {
            return "🍱 續命正餐 / 外賣";
        }
        // 3. 交通關鍵字
        if (/mtr|kmb|lrt|taxi|uber|八達通|地鐵|的士|巴士|過海/.test(text)) {
            return "🚇 交通運輸";
        }
        // 4. 網購/娛樂/課金關鍵字
        if (/apple|hkt|psn|nintendo|steam|taobao|hktvmall|淘寶|課金|買|網購/.test(text)) {
            return "🛍️ 網購娛樂 / 課金";
        }

        // 找不到任何關鍵字，就用上載當下的時間作為保底猜測
        return predictCategoryByTime();
    }

    function handleImage(input) {
        const file = input.files[0];
        if (!file) return;

        document.getElementById('ocr-status').innerText = "⚡ 擺爛 AI 正在深度掃描文字與內容...";
        document.getElementById('debug-box').style.display = 'none';
        
        const reader = new FileReader();
        reader.onload = function() {
            Tesseract.recognize(
                reader.result,
                'eng+chi_tra', // 同時啟用英文與繁體中文識別，精準度大提升！
                { logger: m => console.log(m.status + ": " + Math.round(m.progress * 100) + "%") }
            ).then(({ data: { text } }) => {
                document.getElementById('debug-box').innerText = "🔍 讀取到的卡單內容:\n" + text;
                document.getElementById('debug-box').style.display = 'block';

                // 進行文本內容品類匹配
                finalCategory = matchCategoryByText(text);
                document.getElementById('prediction-type').innerText = "💡 依據截圖商戶匹配品類：";
                document.getElementById('auto-cat
