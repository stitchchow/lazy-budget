### 🔑 How to get your 100% Free Gemini Key

1. Head over to **[Google AI Studio](https://aistudio.google.com/)** and sign in with your normal Google account.
2. Click the prominent **"Get API Key"** button at the top left.
3. Click **"Create API Key"**, choose a project name, and copy the long string of letters/numbers generated.
4. Open your new layout page on your phone, paste it into the top bar field, and click **儲存設定**. 

Now you can upload any crumpled or tricky receipt screenshot. The app will immediately hand it over to Gemini's native visual intelligence model to parse out all itemized costs effortlessly.
