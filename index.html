<script>
    let finalAmount = 0;
    let finalCategory = "日常消費";
    let logs = JSON.parse(localStorage.getItem('擺爛記帳Data_OCR')) || [];

    function predictCategoryByTime() {
        const hour = new Date().getHours();
        if (hour >= 6 && hour < 11) return "☕ 早餐交通";
        if (hour >= 11 && hour < 14) return "🍱 續命午餐";
        if (hour >= 14 && hour < 17) return "🍰 蛇王下午茶";
        if (hour >= 17 && hour < 21) return "🏠 放工晚餐";
        if (hour >= 21 && hour < 24) return "🍺 熱血宵夜";
        return "🌙 凌晨神秘消費";
    }

    function matchCategoryByText(rawText) {
        const text = rawText.toLowerCase();
        if (/coffee|cafe|alpha|starbucks|mcdonald|breakfast|早|美心西餅/.test(text)) return "☕ 早餐 / 咖啡店";
        if (/foodpanda|keeta|deliveroo|restaurant|餐|麵|飯|意粉|譚仔|大家樂|大快活/.test(text)) return "🍱 續命正餐 / 外賣";
        if (/mtr|kmb|lrt|taxi|uber|八達通|地鐵|的士|巴士|過海/.test(text)) return "🚇 交通運輸";
        if (/apple|hkt|psn|nintendo|steam|taobao|hktvmall|淘寶|課金|買|網購/.test(text)) return "🛍️ 網購娛樂 / 課金";
        return predictCategoryByTime();
    }

    function handleImage(input) {
        const file = input.files[0];
        if (!file) return;

        document.getElementById('ocr-status').innerText = "⚡ 擺爛 AI 正在深度掃描文字與內容...";
        document.getElementById('debug-box').style.display = 'none';
        
        const reader = new FileReader();
        reader.onload = function() {
            Tesseract.recognize(
                reader.result,
                'eng+chi_tra',
                { logger: m => console.log(m.status + ": " + Math.round(m.progress * 100) + "%") }
            ).then(({ data: { text } }) => {
                document.getElementById('debug-box').innerText = "🔍 讀取到的卡單內容:\n" + text;
                document.getElementById('debug-box').style.display = 'block';

                finalCategory = matchCategoryByText(text);
                document.getElementById('prediction-type').innerText = "💡 依據截圖商戶匹配品類：";
                document.getElementById('auto-cat').innerText = finalCategory;

                let cleanText = text.replace(/,/g, '');
                let detectedNumbers = [];

                const currencyRegex = /(?:HK\$|\$)\s*(\d+(?:\.\d{1,2})?)/gi;
                let match;
                while ((match = currencyRegex.exec(cleanText)) !== null) {
                    detectedNumbers.push(parseFloat(match[1]));
                }

                if (detectedNumbers.length === 0) {
                    const keywordRegex = /(?:total|amount|sum|pay|fps|轉帳|總計|金額|🛡️|💰)\s*:?\s*(\d+(?:\.\d{1,2})?)/gi;
                    while ((match = keywordRegex.exec(cleanText)) !== null) {
                        detectedNumbers.push(parseFloat(match[1]));
                    }
                }

                if (detectedNumbers.length === 0) {
                    const generalPriceRegex = /\b\d{2,4}\b/g;
                    const pureNumbers = cleanText.match(generalPriceRegex);
                    if (pureNumbers) {
                        detectedNumbers = pureNumbers.map(n => parseFloat(n)).filter(num => num < 2020 || num > 2030);
                    }
                }

                if (detectedNumbers.length > 0) {
                    let maxAmount = Math.max(...detectedNumbers);
                    finalAmount = Math.round(maxAmount);
                    document.getElementById('ocr-status').innerText = "✅ 自動辨識金額與品類成功！";
                    updateUI();
                } else {
                    document.getElementById('ocr-status').innerText = "⚠️ 讀到品類，但金額模糊，請手動校對";
                }
            }).catch(err => {
                document.getElementById('ocr-status').innerText = "⚠️ 辨識失敗，請再試一次";
                console.error(err);
            });
        };
        reader.readAsDataURL(file);
    }

    function adjustAmount(val) {
        finalAmount += val;
        if (finalAmount < 0) finalAmount = 0;
        updateUI();
    }

    function resetInput() {
        finalAmount = 0;
        finalCategory = predictCategoryByTime();
        document.getElementById('prediction-type').innerText = "系統當前預判：";
        document.getElementById('auto-cat').innerText = finalCategory;
        document.getElementById('ocr-status').innerText = "等待下張圖片...";
        document.getElementById('debug-box').style.display = 'none';
        updateUI();
    }

    function saveRecord() {
        if (finalAmount <= 0) return;
        const timeString = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

        logs.unshift({
            id: Date.now(),
            amount: finalAmount,
            category: finalCategory,
            time: timeString
        });
        localStorage.setItem('擺爛記帳Data_OCR', JSON.stringify(logs));

        resetInput();
    }

    // 新增：直接修改金額功能
    function editRecord(id) {
        const targetLog = logs.find(log => log.id === id);
        if (!targetLog) return;
        
        // 彈出輸入框讓用戶改數字
        const newAmount = prompt(`請輸入新的金額 (當前: $${targetLog.amount}):`, targetLog.amount);
        
        if (newAmount !== null && !isNaN(newAmount) && parseInt(newAmount) >= 0) {
            targetLog.amount = Math.round(parseInt(newAmount));
            localStorage.setItem('擺爛記帳Data_OCR', JSON.stringify(logs));
            updateUI();
        }
    }

    function deleteRecord(id) {
        logs = logs.filter(log => log.id !== id);
        localStorage.setItem('擺爛記帳Data_OCR', JSON.stringify(logs));
        updateUI();
    }

    function updateUI() {
        document.getElementById('display-amount').innerText = `$${finalAmount}`;
        const box = document.getElementById('history-box');
        if (logs.length === 0) {
            box.innerHTML = `<div style="color: #666; text-align: center; font-size: 12px; padding: 15px;">未有紀錄，繼續擺爛</div>`;
            return;
        }
        // 在這裡渲染時加了 editRecord(${log.id}) 的按鈕
        box.innerHTML = logs.map(log => `
            <div class="history-item">
                <span>[${log.time}] ${log.category} <b style="color: #ffb74d; margin-left: 10px;">+$${log.amount}</b></span>
                <div>
                    <button style="background:none; border:none; cursor:pointer; font-size:14px; margin-right:8px;" onclick="editRecord(${log.id})">✏️</button>
                    <button class="btn-delete" onclick="deleteRecord(${log.id})">❌</button>
                </div>
            </div>
        `).join('');
    }

    finalCategory = predictCategoryByTime();
    document.getElementById('auto-cat').innerText = finalCategory;
    updateUI();
</script>
