<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>極度擺爛·AI影相OCR記帳 Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #121212; color: #fff;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; margin: 0; padding: 20px;
        }
        .container { width: 100%; max-width: 400px; background: #1e1e1e; padding: 25px; border-radius: 24px; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
        h1 { font-size: 22px; color: #ffb74d; margin: 0 0 5px 0; }
        .subtitle { font-size: 13px; color: #aaa; margin-bottom: 20px; }
        
        .panel { background: #2d2d2d; padding: 15px; border-radius: 16px; margin-bottom: 15px; border: 1px solid #444; }
        .category-badge { display: inline-block; background: #ff5722; color: white; padding: 4px 12px; border-radius: 20px; font-size: 16px; font-weight: bold; margin-top: 5px; }
        
        .current-input { font-size: 45px; font-weight: bold; color: #81c784; margin: 15px 0; letter-spacing: 1px; }

        /* OCR 區域 */
        .ocr-zone { background: #37474f; padding: 15px; border-radius: 16px; margin-bottom: 15px; border: 1px solid #00e5ff; }
        .btn-upload { background: #00e5ff; color: #000; border: none; padding: 12px; font-size: 15px; font-weight: bold; border-radius: 12px; cursor: pointer; width: 100%; display: block; text-align: center; }
        #ocr-status { font-size: 12px; color: #00e5ff; margin-top: 8px; font-weight: bold; min-height: 16px; }

        /* 快速鍵盤調整 */
        .money-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 15px; }
        .btn-money { background: #388e3c; color: white; border: none; padding: 12px 5px; font-size: 15px; font-weight: bold; border-radius: 12px; cursor: pointer; }
        .btn-money.minus { background: #c62828; }
        .btn-money.clear { background: #555; grid-column: span 4; padding: 8px; font-size: 12px; }
        
        .btn-action { background: #0288d1; color: white; border: none; padding: 15px; font-size: 18px; font-weight: bold; border-radius: 16px; cursor: pointer; width: 100%; margin-bottom: 15px; }
        .history { text-align: left; max-height: 120px; overflow-y: auto; background: #1a1a1a; padding: 10px; border-radius: 12px; font-size: 13px; }
        .history-item { padding: 6px 0; border-bottom: 1px solid #333; display: flex; justify-content: space-between; }
        
        /* 測試用：顯示偵測到的文字庫 */
        .debug-log { font-size: 10px; color: #666; text-align: left; background: #000; padding: 8px; border-radius: 8px; max-height: 60px; overflow-y: auto; display: none; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>懶人自動記帳 Pro + Smart OCR</h1>
    <div class="subtitle">影張單 / 掉張 Screencap 全自動讀數</div>

    <div class="panel">
        <div style="font-size: 13px; color: #ccc;">系統自動預判時段：</div>
        <div id="auto-cat" class="category-badge">日常消費</div>
    </div>

    <div class="ocr-zone">
        <label for="file-input" class="btn-upload">📸 影相 / 選擇收據 Screencap</label>
        <input type="file" id="file-input" accept="image/*" style="display: none;" onchange="handleImage(this)">
        <div id="ocr-status">等待上載圖片...</div>
    </div>

    <div class="current-input" id="display-amount">$0</div>

    <div class="money-grid">
        <button class="btn-money minus" onclick="adjustAmount(-10)">-$10</button>
        <button class="btn-money minus" onclick="adjustAmount(-1)">-$1</button>
        <button class="btn-money" onclick="adjustAmount(1)">+$1</button>
        <button class="btn-money" onclick="adjustAmount(10)">+$10</button>
        <button class="btn-money clear" onclick="resetInput()">歸零 / 重設</button>
    </div>

    <button class="btn-action" onclick="saveRecord()">👌 確認記低（自動儲存）</button>

    <h3 style="font-size: 13px; text-align: left; margin: 10px 0 5px 0; color: #aaa;">今日流水帳：</h3>
    <div class="history" id="history-box"></div>
    
    <div id="debug-box" class="debug-log"></div>
</div>

<script>
    let finalAmount = 0;
    let logs = JSON.parse(localStorage.getItem('擺爛記帳Data_OCR')) || [];

    function predictCategory() {
        const hour = new Date().getHours();
        let category = "日常消費";
        if (hour >= 6 && hour < 11) category = "☕ 早餐交通";
        else if (hour >= 11 && hour < 14) category = "🍱 續命午餐";
        else if (hour >= 14 && hour < 17) category = "🍰 蛇王下午茶";
        else if (hour >= 17 && hour < 21) category = "🏠 放工晚餐";
        else if (hour >= 21 && hour < 24) category = "🍺 熱血宵夜";
        else category = "🌙 凌晨神秘消費";
        document.getElementById('auto-cat').innerText = category;
        return category;
    }

    // 進階圖片 OCR 處理
    function handleImage(input) {
        const file = input.files[0];
        if (!file) return;

        document.getElementById('ocr-status').innerText = "⚡ 擺爛 AI 正在深度掃描文字...";
        document.getElementById('debug-box').style.display = 'none';
        
        const reader = new FileReader();
        reader.onload = function() {
            Tesseract.recognize(
                reader.result,
                'eng', // 英語對數字、符號最敏感
                { logger: m => console.log(m.status + ": " + Math.round(m.progress * 100) + "%") }
            ).then(({ data: { text } }) => {
                // 顯示隱藏的 raw text 方便排查
                document.getElementById('debug-box').innerText = "偵測到原始文字:\n" + text;
                document.getElementById('debug-box').style.display = 'block';

                // 清理文字，移除逗號（防千位數干擾例如 1,200 變成 1）
                let cleanText = text.replace(/,/g, '');

                let detectedNumbers = [];

                // 策略 1：尋找明確帶有貨幣符號的金客 (e.g. $45, HK$128.5)
                const currencyRegex = /(?:HK\$|\$)\s*(\d+(?:\.\d{1,2})?)/gi;
                let match;
                while ((match = currencyRegex.exec(cleanText)) !== null) {
                    detectedNumbers.push(parseFloat(match[1]));
                }

                // 策略 2：如果找不到 $ 符號，尋找關鍵字（Total, Amount, 總額, 轉帳）後面的數字
                if (detectedNumbers.length === 0) {
                    const keywordRegex = /(?:total|amount|sum|pay|fps|轉帳|總計|金額|🛡️|💰)\s*:?\s*(\d+(?:\.\d{1,2})?)/gi;
                    while ((match = keywordRegex.exec(cleanText)) !== null) {
                        detectedNumbers.push(parseFloat(match[1]));
                    }
                }

                // 策略 3：終極保底，抓取整張圖裡所有「看起來像價錢」的 2 到 4 位整數
                if (detectedNumbers.length === 0) {
                    const generalPriceRegex = /\b\d{2,4}\b/g;
                    const pureNumbers = cleanText.match(generalPriceRegex);
                    if (pureNumbers) {
                        // 過濾掉明顯像年份的數字 (例如 2024, 2025, 2026)
                        detectedNumbers = pureNumbers.map(n => parseFloat(n)).filter(num => num < 2020 || num > 2030);
                    }
                }

                if (detectedNumbers.length > 0) {
                    // 對於收據、找數畫面，通常「最大」的那個數字就是總金額
                    let maxAmount = Math.max(...detectedNumbers);
                    
                    // 擺爛流：四捨五入抹去小數點，方便記帳
                    finalAmount = Math.round(maxAmount);
                    
                    document.getElementById('ocr-status').innerText = "✅ 成功自動抓取金額！";
                    updateUI();
                } else {
                    document.getElementById('ocr-status').innerText = "❌ 圖片太模糊/找不到金額，請手動調整";
                }
            }).catch(err => {
                document.getElementById('ocr-status').innerText = "⚠️ 辨識崩潰，請再試一次";
                console.error(err);
            });
        };
        reader.readAsDataURL(file);
    }

    function adjustAmount(val) {
        finalAmount += val;
        if (finalAmount < 0) finalAmount = 0;
        updateUI();
    }

    function resetInput() {
        finalAmount = 0;
        document.getElementById('ocr-status').innerText = "等待下張圖片...";
        document.getElementById('debug-box').style.display = 'none';
        updateUI();
    }

    function saveRecord() {
        if (finalAmount <= 0) return;
        const cat = predictCategory();
        const timeString = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

        logs.unshift({ amount: finalAmount, category: cat, time: timeString });
        localStorage.setItem('擺爛記帳Data_OCR', JSON.stringify(logs));

        resetInput();
    }

    function updateUI() {
        document.getElementById('display-amount').innerText = `$${finalAmount}`;
        const box = document.getElementById('history-box');
        if (logs.length === 0) {
            box.innerHTML = `<div style="color: #666; text-align: center; font-size: 12px; padding: 15px;">未有紀錄，繼續擺爛</div>`;
            return;
        }
        box.innerHTML = logs.map(log => `
            <div class="history-item">
                <span>[${log.time}] ${log.category}</span>
                <span style="color: #ffb74d; font-weight:bold;">+$${log.amount}</span>
            </div>
        `).join('');
    }

    predictCategory();
    updateUI();
</script>

</body>
</html>
